<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.

  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Aplikasi Absensi Jemaat GBI Suropati Malang">
  <meta name="theme-color" content="#FF8C00">

  <!-- PWA & iOS meta tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GBI Suropati">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>GBI Suropati Malang</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // Force fresh bootstrap load to avoid stale JS after deploy.
    (function () {
      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js?v=' + Date.now();
      script.async = true;
      document.body.appendChild(script);
    })();
  </script>
</body>
</html>
